# ============================================
# SALMON HVAC - NETLIFY CONFIGURATION
# ============================================
# IMPORTANT: This site MUST only deploy to:
#   Site Name: salmon-hvac
#   Site ID:   a9896567-7739-4354-be13-b04aad4e384f
#   URL:       https://salmon-hvac.netlify.app
# ============================================

[build]
  publish = "."
  command = "node scripts/generate-sitemap.js"

[[redirects]]
  from = "/about/"
  to = "/our-team/"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
